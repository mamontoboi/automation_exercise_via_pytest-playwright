name: UI & API Tests

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

env:
  NAME: ${{ secrets.NAME }}
  EMAIL: ${{ secrets.EMAIL }}
  PASSWORD: ${{ secrets.PASSWORD }}

jobs:
  Statis_Code_Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: ruff check .

  UI_tests:
    runs-on: ubuntu-latest
    needs: [Statis_Code_Analysis]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ae-tests .

      - name: Prepare artifact directories
        run: |
          rm -rf reports test-results allure-results allure-report
          mkdir -p reports
          mkdir -p test-results
          mkdir -p allure-results
          mkdir -p allure-report

      - name: Run UI tests
        id: smoke_or_ui_tests
        continue-on-error: true
        run: |
          docker run --rm \
            -e NAME \
            -e EMAIL \
            -e PASSWORD \
            -v ${{ github.workspace }}/reports:/app/reports \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            ae-tests uv run pytest -m "smoke or ui" \
              --html=reports/html/report-ui.html \
              --self-contained-html \
              --tracing retain-on-failure \
              --screenshot only-on-failure \
              --alluredir=/app/allure-results \
              --reruns 3 --reruns-delay 2

      - name: Install Allure CLI
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          curl -L https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz -o /tmp/allure.tgz
          tar -xzf /tmp/allure.tgz -C /tmp
          sudo mv /tmp/allure-2.29.0 /opt/allure
          echo "/opt/allure/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload UI reports
        if: steps.smoke_or_ui_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/

      - name: Upload UI artifacts
        if: steps.smoke_or_ui_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ui-traces
          path: test-results/

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results/

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-ui
          path: allure-report/

      - name: Fail job if tests failed
        if: steps.smoke_or_ui_tests.outcome == 'failure'
        run: exit 1


  API_tests:
    runs-on: ubuntu-latest
    needs: [Statis_Code_Analysis]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ae-tests .

      - name: Prepare artifact directories
        run: |
          rm -rf reports test-results allure-results allure-report
          mkdir -p reports
          mkdir -p test-results
          mkdir -p allure-results
          mkdir -p allure-report

      - name: Run API tests
        id: api_tests
        continue-on-error: true
        run: |
          docker run --rm \
            -e NAME \
            -e EMAIL \
            -e PASSWORD \
            -v ${{ github.workspace }}/reports:/app/reports \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            ae-tests uv run pytest -m api -n auto \
              --html=reports/html/report-api.html \
              --self-contained-html \
              --alluredir=/app/allure-results \
              --reruns 3 --reruns-delay 2

      - name: Install Allure CLI
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          curl -L https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz -o /tmp/allure.tgz
          tar -xzf /tmp/allure.tgz -C /tmp
          sudo mv /tmp/allure-2.29.0 /opt/allure
          echo "/opt/allure/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload API reports
        if: steps.api_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-api
          path: allure-report/

      - name: Fail job if tests failed
        if: steps.api_tests.outcome == 'failure'
        run: exit 1

  merged_allure_report:
    runs-on: ubuntu-latest
    needs: [UI_tests, API_tests]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download UI Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results-ui

      - name: Download API Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results-api

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          curl -L https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz -o /tmp/allure.tgz
          tar -xzf /tmp/allure.tgz -C /tmp
          sudo mv /tmp/allure-2.29.0 /opt/allure
          echo "/opt/allure/bin" >> $GITHUB_PATH

      - name: Merge Allure results
        run: |
          mkdir -p allure-merged
          cp -R allure-results-ui/. allure-merged/
          cp -R allure-results-api/. allure-merged/

      - name: Generate merged Allure report
        run: allure generate allure-merged -o allure-report --clean

      - name: Upload merged Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-merged
          path: allure-report/

      - name: Setup GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.event_name != 'pull_request'
        uses: actions/deploy-pages@v4

      - name: Add report link to summary
        if: always()
        run: |
          echo "### Allure report" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "The merged report is available as a workflow artifact." >> $GITHUB_STEP_SUMMARY
          else
            echo "Published report: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          fi

  deploy_allure_report:
    runs-on: ubuntu-latest
    needs: merged_allure_report
    if: github.event_name != 'pull_request'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download merged report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-merged
          path: allure-report

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4