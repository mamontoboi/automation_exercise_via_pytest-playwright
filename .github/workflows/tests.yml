name: UI & API Tests

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

env:
  NAME: ${{ secrets.NAME }}
  EMAIL: ${{ secrets.EMAIL }}
  PASSWORD: ${{ secrets.PASSWORD }}

jobs:
  static_analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: ruff check .

  ui_tests:
    name: UI Tests
    needs: static_analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - run: docker build -t ae-tests .

      - run: |
          mkdir -p reports test-results allure-results

      - name: Run UI tests
        id: tests
        continue-on-error: true
        run: |
          docker run --rm \
            -e NAME \
            -e EMAIL \
            -e PASSWORD \
            -v ${{ github.workspace }}/reports:/app/reports \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            ae-tests \
            uv run pytest \
              -m "smoke or ui" \
              --html=reports/html/report-ui.html \
              --self-contained-html \
              --tracing retain-on-failure \
              --screenshot only-on-failure \
              --alluredir=/app/allure-results \
              --reruns 3 \
              --reruns-delay 2

      - if: failure() || steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ui-report
          path: reports

      - if: failure() || steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ui-traces
          path: test-results

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-ui
          path: allure-results

      - if: steps.tests.outcome == 'failure'
        run: exit 1

  api_tests:
    name: API Tests
    needs: static_analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t ae-tests .

      - run: |
          mkdir -p reports allure-results

      - name: Run API tests
        id: tests
        continue-on-error: true
        run: |
          docker run --rm \
            -e NAME \
            -e EMAIL \
            -e PASSWORD \
            -v ${{ github.workspace }}/reports:/app/reports \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            ae-tests \
            uv run pytest \
              -m api \
              -n auto \
              --html=reports/html/report-api.html \
              --self-contained-html \
              --alluredir=/app/allure-results \
              --reruns 3 \
              --reruns-delay 2

      - if: failure() || steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: reports

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results

      - if: steps.tests.outcome == 'failure'
        run: exit 1

  merge_allure:
    name: Merge Allure Report
    needs:
      - ui_tests
      - api_tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-ui

      - uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-api

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre

          curl -L \
            https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz \
            -o allure.tgz

          tar -xzf allure.tgz
          sudo mv allure-2.29.0 /opt/allure
          echo "/opt/allure/bin" >> $GITHUB_PATH

      - name: Merge results
        run: |
          mkdir merged
          cp -R allure-ui/. merged/
          cp -R allure-api/. merged/

      - name: Generate report
        run: |
          allure generate merged \
            -o allure-report \
            --clean

      - uses: actions/upload-artifact@v4
        with:
          name: allure-report-merged
          path: allure-report

  deploy_pages:
    name: Deploy Allure Report
    needs: merge_allure
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download merged report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-merged
          path: allure-report

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.deploy.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY